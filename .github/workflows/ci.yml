name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
          lfs: true

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libpango1.0-dev

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run E2E pipeline tests
        run: cargo test --test e2e_render

      - name: Build release binary
        run: cargo build --release

      - name: Build Python wheel
        run: |
          pip install maturin
          maturin build -m crates/usd-pyo3/Cargo.toml --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: usd-${{ runner.os }}
          path: |
            target/release/usd
            target/release/usd.exe

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: pxr-rs-wheel-${{ runner.os }}
          path: target/wheels/*.whl
