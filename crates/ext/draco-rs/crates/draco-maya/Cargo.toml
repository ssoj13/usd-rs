[package]
name = "draco-maya"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "C-ABI Maya plugin bridge for the Draco Rust port"

[lib]
name = "draco_maya"
crate-type = ["cdylib", "rlib"]

[dependencies]
draco-core = { path = "../draco-core" }
draco-bitstream = { path = "../draco-bitstream" }
