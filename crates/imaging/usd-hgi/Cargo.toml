[package]
name = "usd-hgi"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_hgi"
path = "src/lib.rs"

[dependencies]
usd_gf = { package = "usd-gf", path = "../../base/usd-gf" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
bitflags = "2"
parking_lot = "0.12"
once_cell = "1"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
