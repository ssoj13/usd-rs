[package]
name = "usd-hdsi"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_hdsi"
path = "src/lib.rs"

[dependencies]
parking_lot = "0.12"
usd_geom_util = { package = "usd-geom-util", path = "../usd-geom-util" }
usd_gf = { package = "usd-gf", path = "../../base/usd-gf" }
usd_hd = { package = "usd-hd", path = "../usd-hd" }
usd_px_osd = { package = "usd-px-osd", path = "../usd-px-osd" }
usd_sdf = { package = "usd-sdf", path = "../../usd/usd-sdf" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
once_cell = "1"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
