[package]
name = "usd-utils"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_utils"
path = "src/lib.rs"

[dependencies]
usd_core = { package = "usd-core", path = "../usd-core" }
usd_geom = { package = "usd-geom", path = "../usd-geom" }
usd_sdf = { package = "usd-sdf", path = "../usd-sdf" }
usd_skel = { package = "usd-skel", path = "../usd-skel" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
once_cell = "1"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
