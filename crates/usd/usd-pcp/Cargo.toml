[package]
name = "usd-pcp"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_pcp"
path = "src/lib.rs"

[dependencies]
usd_ar = { package = "usd-ar", path = "../usd-ar" }
usd_sdf = { package = "usd-sdf", path = "../usd-sdf" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_trace = { package = "usd-trace", path = "../../base/usd-trace" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
bitflags = "2"
once_cell = "1"
parking_lot = "0.12"
rayon = "1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
