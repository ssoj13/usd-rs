[package]
name = "usd-sdf"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_sdf"
path = "src/lib.rs"

[dependencies]
usd_ar = { package = "usd-ar", path = "../usd-ar" }
usd_plug = { package = "usd-plug", path = "../../base/usd-plug" }
usd_gf = { package = "usd-gf", path = "../../base/usd-gf" }
usd_js = { package = "usd-js", path = "../../base/usd-js" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_trace = { package = "usd-trace", path = "../../base/usd-trace" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
alembic = { git = "https://github.com/ssoj13/alembic-rs.git", branch = "main", default-features = false, features = ["mmap"] }
bitflags = "2"
bytemuck = { version = "1", features = ["derive"] }
half = "2.7"
indexmap = "2"
log = "0.4"
once_cell = "1"
ordered-float = "5"
parking_lot = "0.12"
regex = "1"
memchr = "2"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
