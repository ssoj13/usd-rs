[package]
name = "usd-ar"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_ar"
path = "src/lib.rs"

[dependencies]
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
usd_plug = { package = "usd-plug", path = "../../base/usd-plug" }
usd_js = { package = "usd-js", path = "../../base/usd-js" }
once_cell = "1"
parking_lot = "0.12"
log = "0.4"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"

[dev-dependencies]
tempfile = "3"
