[package]
name = "usd-core"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_core"
path = "src/lib.rs"

[dependencies]
usd_ar = { package = "usd-ar", path = "../usd-ar" }
usd_gf = { package = "usd-gf", path = "../../base/usd-gf" }
usd_kind = { package = "usd-kind", path = "../usd-kind" }
usd_pcp = { package = "usd-pcp", path = "../usd-pcp" }
usd_sdf = { package = "usd-sdf", path = "../usd-sdf" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_trace = { package = "usd-trace", path = "../../base/usd-trace" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
usd-derive-macros = { path = "../usd-derive-macros" }
ordered-float = "5"
parking_lot = "0.12"
once_cell = "1"
rayon = "1"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"

[dev-dependencies]
openusd-test-path = { path = "../../base/openusd-test-path" }
