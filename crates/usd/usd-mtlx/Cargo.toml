[package]
name = "usd-mtlx"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "usd_mtlx"
path = "src/lib.rs"

[dependencies]
usd_ar = { package = "usd-ar", path = "../usd-ar" }
usd_core = { package = "usd-core", path = "../usd-core" }
usd_gf = { package = "usd-gf", path = "../../base/usd-gf" }
usd_sdf = { package = "usd-sdf", path = "../usd-sdf" }
usd_sdr = { package = "usd-sdr", path = "../usd-sdr" }
usd_shade = { package = "usd-shade", path = "../usd-shade" }
usd_tf = { package = "usd-tf", path = "../../base/usd-tf" }
usd_utils = { package = "usd-utils", path = "../usd-utils" }
usd_vt = { package = "usd-vt", path = "../../base/usd-vt" }
parking_lot = "0.12"
quick-xml = "0.39"

[features]
mtlx-rs = []

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
